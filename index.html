<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latsol UTBK SNBT 2025</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        .q-text img {
    max-width: 100%;
    height: auto;  
    display: block;
    margin: 15px auto; 
    border-radius: 8px;
    border: 1px solid var(--border);
}
        :root {
            --bg-color: #f1f5f9; --sidebar-bg: #ffffff; --card-bg: #ffffff;
            --text-main: #1e293b; --text-muted: #64748b; --accent: #4f46e5;
            --success: #10b981; --danger: #ef4444; --border: #e2e8f0;
            --transition: all 0.3s ease;
        }
        [data-theme="dark"] {
            --bg-color: #0f172a; --sidebar-bg: #1e293b; --card-bg: #1e293b;
            --text-main: #f1f5f9; --text-muted: #94a3b8; --border: #334155;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg-color); color: var(--text-main); display: flex; min-height: 100vh; transition: var(--transition); }

        /* Sidebar Navigation */
        nav { width: 300px; background: var(--sidebar-bg); border-right: 1px solid var(--border); padding: 1.5rem; position: sticky; top: 0; height: 100vh; overflow-y: auto; }
        .logo { font-weight: 800; color: var(--accent); margin-bottom: 2rem; font-size: 1.2rem; letter-spacing: -0.5px; }
        .category-title { font-size: 0.7rem; text-transform: uppercase; color: var(--text-muted); font-weight: 700; margin-bottom: 10px; display: block; }
        
        .subtest-btn { 
            width: 100%; text-align: left; padding: 12px; background: none; border: none; border-radius: 10px; 
            color: var(--text-main); cursor: pointer; font-weight: 600; transition: 0.2s; margin-bottom: 5px; 
        }
        .subtest-btn:hover, .subtest-btn.active { background: rgba(79, 70, 229, 0.1); color: var(--accent); }
        
        .day-list { padding-left: 1rem; display: none; margin-bottom: 15px; }
        .day-list.show { display: block; animation: slideDown 0.3s ease; }
        @keyframes slideDown { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        
        .day-link { 
            display: block; padding: 8px 12px; font-size: 0.85rem; color: var(--text-muted); 
            text-decoration: none; border-radius: 8px; transition: 0.2s;
        }
        .day-link:hover { color: var(--accent); background: var(--bg-color); }

        /* Main Area */
        main { flex: 1; padding: 2.5rem; display: flex; flex-direction: column; align-items: center; position: relative; }
        header { width: 100%; max-width: 750px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; }
        
        .quiz-card { width: 100%; max-width: 750px; background: var(--card-bg); padding: 2.5rem; border-radius: 24px; border: 1px solid var(--border); box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .q-meta { color: var(--accent); font-weight: 700; font-size: 0.9rem; margin-bottom: 1rem; display: block; }
        .q-text { font-size: 1.2rem; font-weight: 500; margin-bottom: 2rem; line-height: 1.7; white-space: pre-line; }

        .options { display: grid; gap: 12px; }
        .option { 
            padding: 16px 20px; border: 2px solid var(--border); border-radius: 14px; 
            cursor: pointer; font-weight: 500; transition: 0.2s; position: relative;
        }
        .option:hover { border-color: var(--accent); background: rgba(79, 70, 229, 0.02); }
        .option.selected { border-color: var(--accent); background: rgba(79, 70, 229, 0.08); }
        .option:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
        .option.correct { border-color: var(--success); color: var(--success); background: rgba(16, 185, 129, 0.08); }
        .option.wrong { border-color: var(--danger); color: var(--danger); background: rgba(239, 68, 68, 0.08); }

        .btn { padding: 14px; border-radius: 12px; border: none; font-weight: 700; cursor: pointer; width: 100%; font-family: 'Inter'; transition: 0.2s; margin-top: 2rem; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }

        .pembahasan { 
            margin-top: 2rem; padding: 1.5rem; background: var(--bg-color); 
            border-left: 5px solid var(--accent); border-radius: 12px; display: none; 
        }

        /* Result Screen */
        .result-screen { text-align: center; display: none; }
        .score-box { font-size: 4rem; font-weight: 800; color: var(--accent); margin: 1rem 0; }
        
        .theme-toggle { background: var(--card-bg); border: 1px solid var(--border); padding: 8px 16px; border-radius: 20px; cursor: pointer; color: var(--text-main); font-weight: 600; font-size: 0.8rem; }
    </style>
</head>
<body>

    <nav>
        <div class="logo">LATSOL UTBK 2025</div>
        <span class="category-title">Menu Belajar</span>
        <div id="sidebar-menu"></div>
    </nav>

    <main>
        <header>
            <h3 id="view-title">Pilih Subtes</h3>
            <button class="theme-toggle" onclick="toggleTheme()">🌙 Mode</button>
        </header>

        <div id="quiz-ui" class="quiz-card" style="display: none;">
            <span class="q-meta" id="q-meta">Soal 1</span>
            <div class="q-text" id="q-text"></div>
            <div class="options" id="options-box" role="radiogroup" aria-labelledby="q-text"></div>
            <button class="btn btn-primary" id="action-btn" disabled onclick="handleAction()">Cek Jawaban</button>
            
            <div class="pembahasan" id="pembahasan-box">
                <strong style="display: block; margin-bottom: 8px;">Pembahasan:</strong>
                <p id="pembahasan-text"></p>
            </div>
        </div>

        <div id="result-ui" class="quiz-card result-screen">
            <h2>Latihan Selesai!</h2>
            <div class="score-box" id="final-score">0</div>
            <p id="result-desc" style="color: var(--text-muted); margin-bottom: 20px;"></p>
            <button class="btn btn-primary" onclick="location.reload()">Selesai & Kembali</button>
        </div>

        <div id="welcome-msg" style="text-align: center; margin-top: 100px; color: var(--text-muted);">
            <p>Selamat datang di Simulator UTBK SNBT.</p>
            <p>Pilih subtes dan hari di samping untuk mulai latihan.</p>
        </div>
    </main>

    <script>
        // 1. Konfigurasi Subtes
        const subtestData = [
            { name: "Penalaran Umum", code: "pu" },
            { name: "Pengetahuan dan Pemahaman Umum", code: "ppu" },
            { name: "Pemahaman Bacaan dan Menulis", code: "pbm" },
            { name: "Pengetahuan Kuantitatif", code: "pk" },
            { name: "Literasi dalam Bahasa Indonesia", code: "lbi" },
            { name: "Literasi dalam Bahasa Inggris", code: "lbe" },
            { name: "Penalaran Matematika", code: "pm" }
        ];

        // 2. Render Sidebar
        const menuContainer = document.getElementById('sidebar-menu');
        subtestData.forEach((sub, index) => {
            const div = document.createElement('div');
            div.innerHTML = `
                <button class="subtest-btn" onclick="toggleSubmenu(${index})">${sub.name}</button>
                <div class="day-list" id="day-list-${index}">
                    ${[1, 2, 3, 4, 5].map(d => `<a href="#" class="day-link" onclick="loadSoal('${sub.code}', ${d}, '${sub.name}')">Hari ke-${d}</a>`).join('')}
                </div>
            `;
            menuContainer.appendChild(div);
        });

        function toggleSubmenu(idx) {
            document.querySelectorAll('.day-list').forEach((el, i) => {
                el.classList.toggle('show', i === idx);
            });
            document.querySelectorAll('.subtest-btn').forEach((btn, i) => {
                btn.classList.toggle('active', i === idx);
            });
        }

        // 3. Logic Loading Soal (Dynamic JS)
        let questions = [];
        let currentIdx = 0;
        let scoreCount = 0;
        let selectedIdx = null;
        let isChecking = false;

        function loadSoal(code, day, fullName) {
            const fileName = `data-${code}-day${day}.js`;
            
            // Hapus script lama
            const oldScript = document.getElementById('dynamic-soal');
            if(oldScript) oldScript.remove();

            const script = document.createElement('script');
            script.id = 'dynamic-soal';
            script.src = fileName;
            
            script.onload = () => {
                if (typeof currentDataSoal !== 'undefined') {
                    questions = currentDataSoal;
                    startQuiz(fullName, day);
                }
            };
            script.onerror = () => alert(`File ${fileName} belum dibuat!`);
            document.body.appendChild(script);
        }

        // 4. Quiz Engine
        function startQuiz(name, day) {
            currentIdx = 0;
            scoreCount = 0;
            document.getElementById('welcome-msg').style.display = 'none';
            document.getElementById('result-ui').style.display = 'none';
            document.getElementById('quiz-ui').style.display = 'block';
            document.getElementById('view-title').innerText = `${name} (Day ${day})`;
            renderQuestion();
        }

function renderQuestion() {
    isChecking = false;
    selectedIdx = null;
    const q = questions[currentIdx];
    
    // Update info nomor soal
    document.getElementById('q-meta').innerText = `Soal ${currentIdx + 1} / ${questions.length}`;
    
    // Render teks pertanyaan
    const qTextElement = document.getElementById('q-text');
    qTextElement.innerHTML = q.pertanyaan;

    // TAMBAHKAN INI: Render gambar jika ada
    if (q.gambar && q.gambar.trim() !== "") {
        // Jika isi 'gambar' sudah berupa tag <img>, kita langsung masukkan
        // Jika hanya link, gunakan: qTextElement.innerHTML += `<img src="${q.gambar}" style="max-width:100%; margin-top:10px;">`;
        qTextElement.innerHTML += `<div class="question-image" style="margin-top: 15px;">${q.gambar}</div>`;
    }

    document.getElementById('pembahasan-box').style.display = 'none';
    document.getElementById('action-btn').innerText = "Cek Jawaban";
    document.getElementById('action-btn').disabled = true;

    const box = document.getElementById('options-box');
    box.innerHTML = '';
    q.pilihan.forEach((p, i) => {
        const div = document.createElement('div');
        div.className = 'option';
        div.innerText = p;
        div.setAttribute('role', 'radio');
        div.setAttribute('tabindex', '0');
        div.setAttribute('aria-checked', 'false');

        const selectOption = () => {
            if(isChecking) return;
            box.querySelectorAll('.option').forEach(el => {
                el.classList.remove('selected');
                el.setAttribute('aria-checked', 'false');
            });
            div.classList.add('selected');
            div.setAttribute('aria-checked', 'true');
            selectedIdx = i;
            document.getElementById('action-btn').disabled = false;
        };

        div.onclick = selectOption;
        div.onkeydown = (e) => {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                selectOption();
            }
        };
        box.appendChild(div);
    });
}

        function handleAction() {
            if (!isChecking) {
                checkAnswer();
            } else {
                currentIdx++;
                if (currentIdx < questions.length) renderQuestion();
                else showResult();
            }
        }

        function checkAnswer() {
            isChecking = true;
            const q = questions[currentIdx];
            const opts = document.querySelectorAll('.option');

            if (selectedIdx === q.kunci) {
                opts[selectedIdx].classList.add('correct');
                scoreCount++;
            } else {
                opts[selectedIdx].classList.add('wrong');
                opts[q.kunci].classList.add('correct');
            }

            document.getElementById('pembahasan-text').innerText = q.bahas;
            document.getElementById('pembahasan-box').style.display = 'block';
            document.getElementById('action-btn').innerText = (currentIdx < questions.length - 1) ? "Lanjut Soal Berikutnya" : "Lihat Hasil";
        }

        function showResult() {
            document.getElementById('quiz-ui').style.display = 'none';
            document.getElementById('result-ui').style.display = 'block';
            const finalScore = Math.round((scoreCount / questions.length) * 100);
            document.getElementById('final-score').innerText = finalScore;
            document.getElementById('result-desc').innerText = `Kamu menjawab ${scoreCount} benar dari ${questions.length} soal.`;
        }

        function toggleTheme() {
            const body = document.documentElement;
            body.getAttribute('data-theme') === 'dark' ? body.removeAttribute('data-theme') : body.setAttribute('data-theme', 'dark');
        }
    </script>
</body>
</html>
